services:
  app:
    build: .
    container_name: rcca-app
    restart: unless-stopped
    env_file:
      - .env.production
    expose:
      - "3000"

  caddy:
    image: caddy:2-alpine
    container_name: rcca-caddy
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      - app

volumes:
  caddy_data:
  caddy_config:
